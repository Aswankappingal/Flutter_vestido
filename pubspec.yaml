name: flutter_vestido
description: A new Flutter project for Vestido Nation.
publish_to: 'none'
# version: 1.0.1+2 #android
version: 1.0.0+2 #ios

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^4.6.0
  flutter_inappwebview: ^6.1.5
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/logo-white.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  web:
    generate: true
    image_path: "assets/App-logo.PNG"
  image_path: "assets/App-logo.PNG"
  min_sdk_android: 21
  remove_alpha_ios: true
